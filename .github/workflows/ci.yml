name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hand_mouse_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: python -m pip install ruff

      - name: Run ruff
        run: ruff check app main.py tests --select E,F --ignore E501

  test:
    name: Run tests with pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hand_mouse_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install pytest pytest-cov

      - name: Run tests
        run: PYTHONPATH=. pytest tests --cov=app --cov-report=term-missing

  build:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    defaults:
      run:
        working-directory: hand_mouse_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: python -m pip install setuptools wheel

      - name: Build sdist
        run: python setup.py sdist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtual-hand-mouse-sdist
          path: hand_mouse_app/dist/